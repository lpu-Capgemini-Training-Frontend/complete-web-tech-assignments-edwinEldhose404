<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online shopping site for mobiles, electronics, funritures, groceries, lifestyle, books and more</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="./flipkart.css">
</head>
<body>
    <header id="parentcontainer">
        <div id="childcontainer1">
            <div id="logos">
                <div id="flipkartlogo">
                        <img src="https://rukminim2.flixcart.com/fk-p-flap/52/44/image/d2ecfddf891a3922.png?q=60" alt="logo">

                    <img src="https://rukminim2.flixcart.com/fk-p-flap/92/36/image/31f7e3af490c225f.png?q=60" alt="flipkart logo">
                </div>
                <div id="travellogo">
                    <img src="https://rukminim1.flixcart.com/fk-p-flap/58/44/image/7ab4040af860941d.png?q=60" alt="travellogo">
                    <img src="https://rukminim2.flixcart.com/fk-p-flap/72/36/image/5a9ff48eef96b876.png?q=60" alt="flipkart-travel-logo">
                </div>
                <div id="grocerieslogo">
                    <img src="https://rukminim1.flixcart.com/fk-p-flap/56/44/image/2545bc4517298b90.png?q=60" alt="groceries-logo">
                    <img src="https://rukminim2.flixcart.com/fk-p-flap/96/36/image/ad3c0b52f83ee8ff.png?q=60" alt="flipkart-groceries-logo">
                </div>
            </div>
            
            <div id="childlocp">
                <div id="location">
                    <p><b>No Location selected</b></p>
                    <select>
                        <option>Select delivery location</option>
                        <option>144411 - Punjab</option>
                        <option>560001 - Bangalore</option>
                        <option>110001 - Delhi</option>
                    </select>
                </div>
            </div>
            
            
        </div>
        <div id="childconatiner2">
            <div id="lowerconatiner1">
                <label for="search"></label>
                <input type="text" placeholder="Search for Products, Brands and More" id="search" name="searchbar">
            </div>
            <div id="lowerconatiner2">
                <div id="loginLogo">
                    <i class="fa-regular fa-user" title="login"></i>
                </div>
                <div id="loginSelect">
                    <select title="Login">
                        <option>Login</option>
                        <option>My Profile</option>
                        <option>Filpkart Plus Zone</option>
                        <option>orders</option>
                        <option>wishlist</option>
                    </select>
                </div>
            </div>
            <div id="lowerconatiner3">
                <select title="more">
                    <option>More</option>
                    <option>Become a Seller</option>
                    <option>Notification Settings</option>
                    <option>24/7 Customer Care</option>
                </select>
            </div>
            <div id="lowerconatiner4">
                <div id="cartlogo">
                    <i class="fa-solid fa-cart-arrow-down"></i>
                </div>
                <div id="cart" title="cart">
                    Cart
                </div>
            </div>
        </div>
    </header>
</body>
</html>
